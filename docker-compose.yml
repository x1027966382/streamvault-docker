version: "3.8"

services:
  streamvault:
    build:
      context: .
      dockerfile: Dockerfile
    image: streamvault:latest
    container_name: streamvault
    restart: unless-stopped
    ports:
      - "28081:28081"
    volumes:
      # Download storage
      - ./data/resources/video:/app/resources/video
      - ./data/resources/cover:/app/resources/cover
      # Database persistence
      - ./data/db:/app/db
      # Temp files
      - ./data/tmp:/tmp
    environment:
      - TZ=Asia/Shanghai
